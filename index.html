<body>
<div class="wrap">
  <header>
    <div class="dot" aria-hidden="true"></div>
    <div style="flex:1"><h1>Pickleball T.M. <span style="font-size:11px;font-weight:500;color:var(--dim);vertical-align:middle">3.4</span></h1><p class="sub" id="tracksub">Doubles · partner rotation</p></div>
  </header>
  <p class="trackslabel">Tracks</p>
  <div id="trackbar"></div>
  <div class="tabs">
    <div class="tab on" data-v="setup">Setup</div>
    <div class="tab" data-v="games">Rounds</div>
    <div class="tab" data-v="rank">Rankings</div>
    <div class="tab" data-v="hist">History</div>
    <div class="tab" data-v="xfer">Transfer</div>
    <div class="tab" data-v="help">Help</div>
  </div>
  <div id="view"></div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  var KEY="pb_app_v4";
  var V3KEY="pb_app_v3";
  var OLDKEY="pb_app_v2";
  var view="setup";
  var DB=null;

  // ---------- data model ----------
  // DB = { roster:[{id,name}], current:session, archive:[snapshot] }
  // session = { date, location, courts, scoreTo, winBonus, nrounds,
  //             players:[id], rounds:[[ {t1:[id..], t2:[id..], s1,s2}... ]],
  //             roundIdx, carryFrom:{stats,h2h,names}|null, rotState, lockedIds }
  // track = { id, name, type:'rr'|'free', current:session, archive:[snapshot] }
  // DB = { roster:[{id,name}], tracks:[track], activeTrackId }
  function uid(){return "p"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
  function tid(){return "t"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
  function blankSession(){
    return {date:new Date().toISOString().slice(0,10),location:"",
      courts:3,scoreTo:11,winBonus:2,nrounds:0,
      players:[],rounds:[],roundIdx:0,carryFrom:null,rotState:null,lockedIds:null,
      levels:{},balanceMode:"normal"};
  }
  function blankTrack(name,type){return {id:tid(),name:name,type:type||"rr",current:blankSession(),archive:[]};}
  function blankDB(){
    var ladder=blankTrack("Ladder","rr");
    var rec=blankTrack("Rec","free");
    return {roster:[],tracks:[ladder,rec],activeTrackId:ladder.id};
  }

  function loadDB(){
    var raw=null;
    try{raw=localStorage.getItem(KEY);}catch(e){}
    if(raw){
      try{DB=reviveDB(JSON.parse(raw));}catch(e){DB=blankDB();}
    }else{
      // try v3 (id-based, single-track) then v2 (name-based)
      var v3=null,v2=null;
      try{v3=localStorage.getItem(V3KEY);}catch(e){}
      try{v2=localStorage.getItem(OLDKEY);}catch(e){}
      if(v3){try{DB=migrateV3toV4(JSON.parse(v3));}catch(e){DB=blankDB();}}
      else if(v2){try{DB=migrateV3toV4(migrateV2(JSON.parse(v2)));}catch(e){DB=blankDB();}}
      else DB=blankDB();
    }
    if(!DB||typeof DB!=="object")DB=blankDB();
    if(!Array.isArray(DB.roster))DB.roster=[];
    if(!Array.isArray(DB.tracks)||!DB.tracks.length)DB=Object.assign(DB,{tracks:blankDB().tracks});
    if(!DB.activeTrackId||!DB.tracks.some(function(t){return t.id===DB.activeTrackId;}))DB.activeTrackId=DB.tracks[0].id;
    // normalize each track's current session
    DB.tracks.forEach(function(t){
      if(!t.type)t.type="rr";
      if(!t.current)t.current=blankSession();
      if(!Array.isArray(t.archive))t.archive=[];
      var s=t.current;
      if(s.winBonus==null)s.winBonus=2;
      if(!Array.isArray(s.players))s.players=[];
      if(!Array.isArray(s.rounds))s.rounds=[];
      if(s.scoreTo==null)s.scoreTo=11;
      if(s.courts==null)s.courts=3;
    });
  }
  function saveDB(){try{DB._savedAt=Date.now();localStorage.setItem(KEY,JSON.stringify(serializeDB(DB)));}catch(e){}}
  // sitouts lives as a property on the courts ARRAY, which JSON.stringify drops.
  // serializeDB copies it into a real key (_sit) on the array's container so it survives;
  // reviveDB restores courts.sitouts after parse. Applied on every save/load and transfer.
  function serializeDB(db){
    var copy=JSON.parse(JSON.stringify(db)); // base clone (loses sitouts)
    db.tracks.forEach(function(t,ti){
      collectSit(t.current,copy.tracks[ti].current);
      (t.archive||[]).forEach(function(a,ai){ if(copy.tracks[ti].archive[ai]) collectSit(a,copy.tracks[ti].archive[ai]); });
    });
    return copy;
  }
  function collectSit(srcSess,dstSess){
    if(!srcSess||!srcSess.rounds||!dstSess)return;
    dstSess._sit=srcSess.rounds.map(function(courts){return (courts&&courts.sitouts)?courts.sitouts.slice():null;});
  }
  function reviveDB(db){
    if(!db||!db.tracks)return db;
    db.tracks.forEach(function(t){

      pc[pkey(ct.t2[0],ct.t2[1])]=(pc[pkey(ct.t2[0],ct.t2[1])]||0)+1;

  // Choose who sits: fairness first (lowest sit tally), then minimize repeat co-sitting.
  function chooseSitters(ids,sitCount,tally,spc){
    // Step 1: figure out the fair tally ceiling. We must pick sitCount players, preferring lowest tally.
    // Determine the set of "eligible" players: those whose tally is low enough to be fair this round.
    var sorted=ids.slice().sort(function(a,b){return tally[a]-tally[b];});
    // The fairness rule: after sitting, spread stays <=1. Players with the minimum tally must be exhausted
    // before anyone one-above them sits. Build eligibility tiers by tally value.
    // Candidate pool = enough lowest-tally players to choose from, but allow the whole "tied" tier so we can
    // diversify groupings within a tier.
    var threshold=tally[sorted[sitCount-1]]; // the tally of the last forced sitter under pure fairness
    var mustSit=sorted.filter(function(x){return tally[x]<threshold;}); // strictly below threshold: forced in
    var tier=sorted.filter(function(x){return tally[x]===threshold;});  // tied at threshold: choose among these
    var needFromTier=sitCount-mustSit.length;

  // ---------- Level-balanced round building (v3.0.1) --------------------------
  // History-aware: builds ONE round at a time using current partner history (pc),
  // so partner variety stays priority #1 and balance happens within it.
  // Even courts first (each court ~equal avg level), then balance teams within;
  // repeat-partner penalty dominates so the same pair won't keep getting welded.
  function splitTeamsByLevel(four,lv,pc){
    var combos=[[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]];
    var best=null,bp=null;
    combos.forEach(function(cm){
      var t1=cm[0].map(function(i){return four[i];}),t2=cm[1].map(function(i){return four[i];});
      var s1=t1.reduce(function(a,x){return a+(lv[x]||0);},0),s2=t2.reduce(function(a,x){return a+(lv[x]||0);},0);
      var gap=Math.abs(s1-s2);

      var cost=rep*100+gap;
      if(best===null||cost<best){best=cost;bp={t1:t1,t2:t2,gap:gap,rep:rep};}
    });

  // Build a single balanced/similar round from the playing set, honoring partner history.
  // Returns {courts:[{t1,t2,s1,s2}], worstGap, courtSpread}
  function arrangeBalanced(playing,lv,nCourts,mode,pc){

  function buildOneBalancedRound(ids,courts,priorRounds,rawLevels,mode){

  // rebuild partner/opp/sit history by replaying the actual rounds (used after manual swaps)
  function recomputeRotState(rounds){

  // ---------- stats ----------

      e.scored+=cy.scored||0;e.against+=cy.against||0;e.bonus+=cy.bonus||0;e.possible+=cy.possible||0;e.wsum+=cy.wsum||0;
    });
    var target=sess.scoreTo||11;
    // per-game weighted value = point-share in that game + 0.5 if won
    function addGame(ids,my,opp,won){ids.forEach(function(x){var e=ensure(x);var tot=my+opp;var share=tot>0?my/tot:0;e.wsum+=share+(won?0.5:0);});}
    sess.rounds.forEach(function(courts){courts.forEach(function(g){
      if(g.s1==null||g.s2==null)return;
      g.t1.concat(g.t2).forEach(function(x){var e=ensure(x);e.gp++;e.possible+=target;});
      g.t1.forEach(function(x){var e=ensure(x);e.pts+=g.s1;e.scored+=g.s1;e.against+=g.s2;});
      g.t2.forEach(function(x){var e=ensure(x);e.pts+=g.s2;e.scored+=g.s2;e.against+=g.s1;});
      var t1won=g.s1>g.s2,t2won=g.s2>g.s1;
      addGame(g.t1,g.s1,g.s2,t1won);addGame(g.t2,g.s2,g.s1,t2won);
      if(t1won){g.t1.forEach(function(x){var e=ensure(x);e.w++;e.pts+=sess.winBonus;e.bonus+=sess.winBonus;});g.t2.forEach(function(x){ensure(x).l++;});}
      else if(t2won){g.t2.forEach(function(x){var e=ensure(x);e.w++;e.pts+=sess.winBonus;e.bonus+=sess.winBonus;});g.t1.forEach(function(x){ensure(x).l++;});}
    });});
    var arr=Object.keys(m).map(function(k){return m[k];});
    arr.forEach(function(p){var contested=p.scored+p.against;p.pct=contested>0?Math.round(100*p.scored/contested):0;p.pctPoss=p.possible>0?Math.round(100*p.scored/p.possible):0;p.ppg=p.gp>0?(p.scored/p.gp):0;p.weighted=p.gp>0?Math.round(100*p.wsum/p.gp):0;p.rankPct=p.possible>0?Math.round(100*(p.scored+p.bonus)/p.possible):0;});
    return arr.sort(function(a,b){return b.rankPct-a.rankPct||b.pct-a.pct||b.gp-a.gp;});
  }
  function anyScores(sess){sess=sess||S();return sess.rounds.some(function(c){return c.some(function(g){return g.s1!=null&&g.s2!=null;});});}

  // head-to-head; merges carried h2h then adds current rounds
  function headToHead(sess){
    sess=sess||S();
    var H={};
    function ensure(a){if(!H[a])H[a]={opp:{},par:{}};return H[a];}
    function bump(slot,b,win,pf,pa){if(!slot[b])slot[b]={w:0,l:0,pf:0,pa:0};slot[b].pf+=pf;slot[b].pa+=pa;if(win)slot[b].w++;else slot[b].l++;}
    // seed from carried h2h
    var carried=(sess.carryFrom&&sess.carryFrom.h2h)?sess.carryFrom.h2h:null;
    if(carried){
      Object.keys(carried).forEach(function(a){
        var src=carried[a];ensure(a);
        ["opp","par"].forEach(function(kind){
          if(src[kind])Object.keys(src[kind]).forEach(function(b){
            var d=src[kind][b];H[a][kind][b]={w:d.w||0,l:d.l||0,pf:d.pf||0,pa:d.pa||0};
          });
        });
      });
    }
    sess.rounds.forEach(function(courts){courts.forEach(function(g){
      if(g.s1==null||g.s2==null||g.s1===g.s2)return;
      var t1win=g.s1>g.s2;
      // partners only exist in doubles (two-player teams)
      [[g.t1,g.s1,g.s2,t1win],[g.t2,g.s2,g.s1,!t1win]].forEach(function(d){
        var team=d[0],pf=d[1],pa=d[2],win=d[3];
        if(team.length>=2&&team[0]&&team[1]){var a=team[0],b=team[1];ensure(a);ensure(b);
          bump(H[a].par,b,win,pf,pa);bump(H[b].par,a,win,pf,pa);}
      });
      g.t1.forEach(function(a){g.t2.forEach(function(b){if(!a||!b)return;ensure(a);ensure(b);
        bump(H[a].opp,b,t1win,g.s1,g.s2);bump(H[b].opp,a,!t1win,g.s2,g.s1);});});
    });});
    return H;
  }

  // merge a source H2H matrix INTO a target (accumulate w/l/pf/pa)
  function mergeH2H(target,src){
    if(!src)return target;
    Object.keys(src).forEach(function(a){
      if(!target[a])target[a]={opp:{},par:{}};
      ["opp","par"].forEach(function(kind){
        var sk=src[a][kind];if(!sk)return;
        Object.keys(sk).forEach(function(b){
          var d=sk[b];if(!target[a][kind][b])target[a][kind][b]={w:0,l:0,pf:0,pa:0};
          var t=target[a][kind][b];
          t.w+=d.w||0;t.l+=d.l||0;t.pf+=d.pf||0;t.pa+=d.pa||0;
        });
      });
    });
    return target;
  }
  // cumulative H2H for a single track: current session (own games, no carry double-count) + all archived h2h
  function cumulativeH2HForTrack(tr){
    var acc={};
    // current session's own games (exclude carryFrom so we don't double-count carried matrices)
    var bare={date:tr.current.date,winBonus:tr.current.winBonus,scoreTo:tr.current.scoreTo,players:tr.current.players,rounds:tr.current.rounds,carryFrom:null};
    mergeH2H(acc,headToHead(bare));
    // archived structured h2h (only present for sessions saved in v1.1+); skip excluded sessions
    (tr.archive||[]).forEach(function(a){if(a.excluded)return;if(a.h2h)mergeH2H(acc,a.h2h);});
    return acc;
  }
  // cumulative across all tracks
  function cumulativeH2HAllTracks(){
    var acc={};
    DB.tracks.forEach(function(tr){mergeH2H(acc,cumulativeH2HForTrack(tr));});
    return acc;
  }
  // how many archived sessions lack structured h2h (pre-v1.1) — for honest UI note
  function archivedH2HGaps(scopeAll){
    var tracks=scopeAll?DB.tracks:[curTrack()];
    var gaps=0;
    tracks.forEach(function(tr){(tr.archive||[]).forEach(function(a){if(!a.h2h)gaps++;});});
    return gaps;
  }

  // snapshot a finished session for History (store names + h2h text + structured h2h)
  function snapshot(s){
    var st=standings(s);
    // defensively normalize rounds so a malformed shape can't break saving
    var safeRounds=(s.rounds||[]).map(function(c){
      var courts=Array.isArray(c)?c:[];
      return courts.map(function(g){
        g=g||{};
        return {t1:Array.isArray(g.t1)?g.t1.slice():[],t2:Array.isArray(g.t2)?g.t2.slice():[],s1:(g.s1==null?null:g.s1),s2:(g.s2==null?null:g.s2)};
      });
    });
    var safeSit=(s.rounds||[]).map(function(c){return (c&&c.sitouts)?c.sitouts.slice():null;});
    return {date:s.date,location:s.location,winBonus:s.winBonus,
      results:st.map(function(p){return {id:p.id,name:nameOf(p.id),pts:p.pts,scored:p.scored,against:p.against,bonus:p.bonus,w:p.w,l:p.l,gp:p.gp,possible:p.possible,pct:p.pct,pctPoss:p.pctPoss,ppg:Math.round(p.ppg*10)/10,wsum:p.wsum,weighted:p.weighted,rankPct:p.rankPct};}),
      h2hText:h2hExportText(s),h2h:headToHead(s),savedAt:Date.now(),
      // editable source so scores can be corrected later (v1.9+)
      src:{date:s.date,location:s.location,courts:s.courts,scoreTo:s.scoreTo,winBonus:s.winBonus,nrounds:s.nrounds,players:(s.players||[]).slice(),
        rounds:safeRounds,
        sit:safeSit,
        carryFrom:s.carryFrom||null}};
  }
  // rebuild a live-style session object from an archived snapshot's src (for editing)
  function sessionFromArchiveSrc(src){
    var sess=blankSession();
    sess.date=src.date;sess.location=src.location||"";sess.courts=src.courts||1;sess.scoreTo=src.scoreTo||11;
    sess.winBonus=src.winBonus==null?2:src.winBonus;sess.nrounds=src.nrounds||0;sess.players=(src.players||[]).slice();
    sess.rounds=JSON.parse(JSON.stringify(src.rounds||[]));
    if(src.sit)src.sit.forEach(function(arr,i){if(arr&&sess.rounds[i])sess.rounds[i].sitouts=arr;});
    sess.carryFrom=src.carryFrom||null;
    sess.rotState=recomputeRotState(sess.rounds);
    return sess;
  }
  // Clear the CURRENT session of the active track: archive it first (if it has scores),
  // then wipe current scores/rounds so a fresh session can start. History + roster + locked target kept.
  function clearTrackData(){
    var tr=curTrack();var s=tr.current;
    if(!confirm("Are you sure you want to clear data?"))return;
    if(anyScores())tr.archive.unshift(snapshot(s));
    var keep=s.players.slice(),c=s.courts,to=s.scoreTo,wb=s.winBonus;
    tr.current=blankSession();
    tr.current.players=keep;tr.current.courts=c;tr.current.scoreTo=to;tr.current.winBonus=wb;
    saveDB();view="setup";render();
    toast("Data cleared — previous session saved to History");
  }

  function startNewSessionFromSetup(){
    var tr=curTrack();var s=tr.current;
    var had=anyScores();
    var msg=had
      ? "Start a new session on the “"+tr.name+"” track?\n\nThe current session will be saved to History first, then cleared so you can set up a new one."
      : "Start a new session on the “"+tr.name+"” track?\n\nThis clears the current rounds so you can set up a new one. (Nothing to save yet.)";
    if(!confirm(msg))return;
    if(had)tr.archive.unshift(snapshot(s));
    var keep=s.players.slice(),c=s.courts,to=s.scoreTo,wb=s.winBonus;
    tr.current=blankSession();
    tr.current.players=keep;tr.current.courts=c;tr.current.scoreTo=to;tr.current.winBonus=wb;
    saveDB();view="setup";render();
    if(had)alert("Saved to History. “"+tr.name+"” now has "+tr.archive.length+" saved session"+(tr.archive.length===1?"":"s")+".\n\nYou can set up the new session now — your players carried over.");
    else toast("Fresh session — set it up below");
  }

  function endSession(){
    var tr=curTrack();var s=tr.current;
    if(!anyScores()){
      alert("Nothing to save yet.\n\nThis session ("+tr.name+") has no completed games. Enter at least one final score first, then End session.");
      return;
    }
    if(!confirm("End this session on the “"+tr.name+"” track?\n\nIt will be saved to History, and a fresh session will be ready for next time."))return;
    try{
      tr.archive.unshift(snapshot(s));
      var savedCount=tr.archive.length;
      var keep=s.players.slice(),c=s.courts,to=s.scoreTo,wb=s.winBonus;
      tr.current=blankSession();
      tr.current.players=keep;tr.current.courts=c;tr.current.scoreTo=to;tr.current.winBonus=wb;
      saveDB();view="hist";render();
      alert("Saved to History.\n\n“"+tr.name+"” now has "+savedCount+" saved session"+(savedCount===1?"":"s")+". You're looking at the History tab for this track.");
    }catch(err){
      // never fail silently — tell the user what happened
      try{tr.archive.shift&&(tr.archive[0]&&tr.archive[0].savedAt&&Date.now()-tr.archive[0].savedAt<2000?tr.archive.shift():0);}catch(e){}
      alert("Couldn't save this session — something in the data tripped it up.\n\n("+(err&&err.message?err.message:"unknown error")+")\n\nYour scores are still here, nothing was lost. Try again, and if it keeps happening, use Transfer to save a backup and let Mark know.");
    }
  }

  function renderGames(host){
    var s=S();

        var modeDesc={normal:"Rotates partners first so everyone partners everyone, then mixes opponents. (Ignores levels.)",

            lvCard.appendChild(row);
          });
          host.appendChild(lvCard);
          lvCard.querySelectorAll(".lvlinp").forEach(function(inp){
            inp.onchange=function(){var v=parseFloat(inp.value);if(isNaN(v)){delete s.levels[inp.dataset.id];}else{s.levels[inp.dataset.id]=v;}saveDB();};
          });

        var seats=s.courts*4,playing=Math.min(ids.length,seats);playing-=playing%4;var sit=Math.max(0,ids.length-playing);

      var ar=document.createElement("div");ar.className="row";ar.style.marginTop="8px";

      panel.appendChild(ar);host.appendChild(panel);
      ar.querySelector("#swnewb").onclick=function(){var v=ar.querySelector("#swnew").value.trim();if(!v)return;var id=addToRoster(v);bringIn(s._swapSel,id);};
      ar.querySelector("#swnew").onkeydown=function(e){if(e.key==="Enter"){var v=e.target.value.trim();if(v){var id=addToRoster(v);bringIn(s._swapSel,id);}}};
    }

    function bringIn(pos,newId){
      var displaced=getId(pos);
      if(displaced===newId){s._swapSel=null;saveDB();render();return;}
      // if the newcomer is already elsewhere in this round, pull them out of that spot first
      removeFromRound(newId);
      setId(pos,newId);
      if(!courts.sitouts)courts.sitouts=[];
      if(pos.kind!=="sit" && displaced){
        // displaced playing person goes to the bench (kept in the round, available to swap back)
        if(courts.sitouts.indexOf(displaced)<0)courts.sitouts.push(displaced);
      }
      // (if pos was a sit slot, the displaced bencher is simply replaced and leaves this round)
      // ensure newcomer is in the session player list for standings
      if(s.players.indexOf(newId)<0)s.players.push(newId);

    function removeFromRound(id){
      courts.forEach(function(ct){
        for(var k=0;k<ct.t1.length;k++)if(ct.t1[k]===id)ct.t1[k]=null;
        for(var k2=0;k2<ct.t2.length;k2++)if(ct.t2[k2]===id)ct.t2[k2]=null;
      });
      if(courts.sitouts)courts.sitouts=courts.sitouts.filter(function(x){return x!==id;});
    }
    function cleanRound(){
      // remove null/duplicate benchers and anyone benched who is also playing
      var seen={},clean=[];
      (courts.sitouts||[]).forEach(function(x){if(x&&!seen[x]&&!isPlaying(x)){seen[x]=1;clean.push(x);}});
      courts.sitouts=clean;
    }
    function isPlaying(id){var p=false;courts.forEach(function(ct){if(ct.t1.indexOf(id)>=0||ct.t2.indexOf(id)>=0)p=true;});return p;}

    var another=null;
    function refreshAnother(){if(!another)return;
      var done=s.rounds[s.rounds.length-1].every(function(g){return g.s1!=null&&g.s2!=null;});
      if(done){another.disabled=false;another.style.opacity="1";another.textContent="＋ Play another round";}
      else{another.disabled=true;another.style.opacity=".5";another.textContent="Enter this round's scores to add another";}
    }

    function doSwap(posA,posB){

        if(s._swapSel.key===pos.key){s._swapSel=null;saveDB();render();return;}
        doSwap(s._swapSel,pos);
      };
      return span;
    }

    // current Score% per player for the pairing display (level + standing)
    window._pairStats={};
    try{standings(s).forEach(function(p){window._pairStats[p.id]={rankPct:p.rankPct,gp:p.gp};});}catch(e){}

    courts.forEach(function(g,ci){

            var piece=document.createElement("span");
            var lvl=(s.levels&&s.levels[id]!=null)?s.levels[id]:(ratingOf(id));
            var sp=(window._pairStats&&window._pairStats[id]);
            var meta=[];
            if(lvl!=null)meta.push("L"+fmtRating(lvl));
            if(sp&&sp.gp>0)meta.push(sp.rankPct+"%");
            piece.textContent=nameOf(id)+(meta.length?" ":"");
            if(meta.length){var mspan=document.createElement("span");mspan.className="pmeta";mspan.textContent="("+meta.join(" · ")+")";piece.appendChild(mspan);}
            nm.appendChild(piece);
            if(slot<team.length-1)nm.appendChild(document.createTextNode(" & "));
          });
        }
        rowdiv.appendChild(nm);
        var inp=document.createElement("input");inp.className="score "+(sideClass==="t1"?"s1":"s2");inp.type="number";inp.setAttribute("inputmode","numeric");inp.setAttribute("pattern","[0-9]*");
        inp.value=(sideClass==="t1"?(g.s1==null?"":g.s1):(g.s2==null?"":g.s2));inp.placeholder="–";
        if(swapOn)inp.style.display="none";
        rowdiv.appendChild(inp);
        return {rowdiv:rowdiv,inp:inp};
      }
      var r1=teamRow(g.t1,"t1",g.s1>g.s2);
      var vsd=document.createElement("div");vsd.className="vs";vsd.textContent="vs";
      var r2=teamRow(g.t2,"t2",g.s2>g.s1);
      card.appendChild(r1.rowdiv);card.appendChild(vsd);card.appendChild(r2.rowdiv);
      host.appendChild(card);
      if(!swapOn){
        var s1=r1.inp,s2=r2.inp;
        function sync(){var v1=s1.value===""?null:parseInt(s1.value);var v2=s2.value===""?null:parseInt(s2.value);
          g.s1=isNaN(v1)?null:v1;g.s2=isNaN(v2)?null:v2;saveDB();
          var d=g.s1!=null&&g.s2!=null;
          r1.rowdiv.classList.toggle("w",d&&g.s1>g.s2);r2.rowdiv.classList.toggle("w",d&&g.s2>g.s1);refreshAnother();}
        s1.addEventListener("input",sync);s2.addEventListener("input",sync);
      }
    });
    // sit-outs (tappable in swap mode so you can sub someone in)
    if(courts.sitouts&&courts.sitouts.length){
      if(swapOn){
        var sitWrap=document.createElement("p");sitWrap.className="sitout";sitWrap.appendChild(document.createTextNode("Sitting out: "));
        courts.sitouts.forEach(function(id,idx){
          sitWrap.appendChild(slotSpan(nameOf(id),{kind:"sit",idx:idx,key:"sit"+idx}));
          if(idx<courts.sitouts.length-1)sitWrap.appendChild(document.createTextNode(", "));
        });

      }else host.appendChild(el_sit(courts.sitouts));

    if(!swapOn && ri===s.rounds.length-1){
      if(inBalance){

        nextWrap.innerHTML='<p class="lbl">Next round</p>'+
          '<div class="gtype" style="margin-bottom:6px">'+
            '<button id="nm_b" class="'+(s.balanceMode==="balanced"?"on":"")+'">Balanced</button>'+

          s.rounds.push(step.courts);var ni=s.rounds.length-1;
          if(!s._roundMeta)s._roundMeta={};s._roundMeta[ni]={mode:s.balanceMode,worstGap:step.worstGap,courtSpread:step.courtSpread};
          s.roundIdx=ni;s.rotState=recomputeRotState(s.rounds);saveDB();render();toast("Round "+(ni+1)+" ready");
        };

        host.appendChild(another);refreshAnother();

    }
    if(!swapOn){
      var endb=document.createElement("button");endb.className="btn";endb.style.marginTop="6px";endb.textContent="End session & save to History";
      endb.onclick=endSession;
      host.appendChild(endb);
      var regen=document.createElement("button");regen.className="btn ghost";regen.style.color="var(--muted)";regen.textContent="Regenerate schedule";
      regen.onclick=function(){if(anyScores()&&!confirm("Regenerate? Clears entered scores."))return;
        s._swap=false;s._swapSel=null;s._roundMeta={};
        if(s.balanceMode==="balanced"||s.balanceMode==="similar"){
          ensureLevels();
          var allIds=s.lockedIds||s.players.slice();
          var step=buildOneBalancedRound(allIds,s.courts,[],s.levels,s.balanceMode);
          s.rounds=[step.courts];s.roundIdx=0;s._roundMeta[0]={mode:s.balanceMode,worstGap:step.worstGap,courtSpread:step.courtSpread};
          s.rotState=recomputeRotState(s.rounds);saveDB();render();return;
        }
        var res=genRounds(ids,s.nrounds||roundsToPartnerAll(ids.length),s.courts);s.rounds=res.rounds;s.rotState=res.state;s.lockedIds=ids.slice();s.roundIdx=0;saveDB();render();};
      host.appendChild(regen);
    }
  }
  function el_sit(ids){var p=document.createElement("p");p.className="sitout";p.textContent="Sitting out: "+ids.map(nameOf).join(", ");return p;}

  // ---- free-play (one-off games) ----
  function freeGames(s){if(!s.rounds.length)s.rounds.push([]);return s.rounds[0];}
  function renderFree(host){
    var s=S();
    if(!s._fp)s._fp={type:"doubles",t1:[null,null],t2:[null,null],s1:"",s2:""};
    var fp=s._fp;

    // session header
    var sess=document.createElement("div");sess.className="card";
    sess.innerHTML='<div class="field"><label>Date</label><input type="date" id="f_date" value="'+esc(s.date)+'"></div>'+
      '<div class="field"><label>Location</label><input type="text" id="f_loc" placeholder="optional" value="'+esc(s.location)+'" style="flex:1;max-width:60%"></div>'+
      '<div class="field"><label>Games to</label><input type="number" class="num" id="f_to" value="'+s.scoreTo+'"></div>'+
      '<div class="field"><label>Win bonus (pts)</label><input type="number" class="num" id="f_bonus" value="'+s.winBonus+'"></div>';
    host.appendChild(sess);
    sess.querySelector("#f_date").onchange=function(e){s.date=e.target.value;saveDB();};
    sess.querySelector("#f_loc").oninput=function(e){s.location=e.target.value;saveDB();};
    sess.querySelector("#f_to").onchange=function(e){s.scoreTo=parseInt(e.target.value)||11;saveDB();};
    sess.querySelector("#f_bonus").onchange=function(e){var v=parseInt(e.target.value);s.winBonus=isNaN(v)?2:v;saveDB();};

    // new game entry
    var entry=document.createElement("div");entry.className="card";
    entry.innerHTML='<p class="lbl">Add a game</p>'+
      '<div class="gtype"><button id="gd" class="'+(fp.type==="doubles"?"on":"")+'">Doubles</button><button id="gs" class="'+(fp.type==="singles"?"on":"")+'">Singles</button></div>';
    host.appendChild(entry);
    entry.querySelector("#gd").onclick=function(){fp.type="doubles";fp.t1=[fp.t1[0]||null,null];fp.t2=[fp.t2[0]||null,null];render();};
    entry.querySelector("#gs").onclick=function(){fp.type="singles";render();};

    // v3.4: players who just played float to the top of the pickers, most-recent game first.
    // Recency comes from play order: freeGames is newest-last, so walk it backward and
    // collect player ids in the order they most recently appeared. Players who haven't
    // played this session fall to the bottom, alphabetical among themselves.
    var rosterAlpha=DB.roster.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
    var playedGames=freeGames(s).filter(function(g){return g&&g.t1&&g.t2;});
    var recencyIds=[];
    for(var gi=playedGames.length-1;gi>=0;gi--){
      var g=playedGames[gi];
      (g.t1.concat(g.t2)).forEach(function(id){if(id&&recencyIds.indexOf(id)<0)recencyIds.push(id);});
    }
    var opts=[];
    recencyIds.forEach(function(id){var r=rosterAlpha.filter(function(x){return x.id===id;})[0];if(r)opts.push(r);});
    rosterAlpha.forEach(function(r){if(recencyIds.indexOf(r.id)<0)opts.push(r);});
    function fpAddPlayer(name){
      addToRoster(name);
      saveDB();render();
    }
    function select(teamArr,slot){
      var sel=document.createElement("select");
      var none=document.createElement("option");none.value="";none.textContent="— pick player —";sel.appendChild(none);
      opts.forEach(function(r){var o=document.createElement("option");o.value=r.id;o.textContent=r.name;if(teamArr[slot]===r.id)o.selected=true;sel.appendChild(o);});
      sel.onchange=function(){teamArr[slot]=sel.value||null;saveDB();};
      return sel;
    }
    var teams=document.createElement("div");teams.className="row";teams.style.alignItems="flex-start";
    var team1=document.createElement("div");team1.className="fpteam";
    var t1s1=document.createElement("div");t1s1.className="fpslot";t1s1.appendChild(select(fp.t1,0));team1.appendChild(t1s1);
    if(fp.type==="doubles"){var t1s2=document.createElement("div");t1s2.className="fpslot";t1s2.appendChild(select(fp.t1,1));team1.appendChild(t1s2);}
    var vs=document.createElement("div");vs.className="vs";vs.textContent="vs";vs.style.padding="8px 4px";
    var team2=document.createElement("div");team2.className="fpteam";
    var t2s1=document.createElement("div");t2s1.className="fpslot";t2s1.appendChild(select(fp.t2,0));team2.appendChild(t2s1);
    if(fp.type==="doubles"){var t2s2=document.createElement("div");t2s2.className="fpslot";t2s2.appendChild(select(fp.t2,1));team2.appendChild(t2s2);}
    teams.appendChild(team1);teams.appendChild(vs);teams.appendChild(team2);
    entry.appendChild(teams);

    var scores=document.createElement("div");scores.className="row";scores.style.marginTop="10px";scores.style.justifyContent="center";
    scores.innerHTML='<input class="score" id="fs1" type="number" inputmode="numeric" pattern="[0-9]*" value="'+esc(fp.s1)+'" placeholder="–"><span class="vs">:</span><input class="score" id="fs2" type="number" inputmode="numeric" pattern="[0-9]*" value="'+esc(fp.s2)+'" placeholder="–">';
    entry.appendChild(scores);
    scores.querySelector("#fs1").oninput=function(e){fp.s1=e.target.value;};
    scores.querySelector("#fs2").oninput=function(e){fp.s2=e.target.value;};

    var addnew=document.createElement("div");addnew.className="row";addnew.style.marginTop="10px";
    addnew.innerHTML='<input type="text" id="fpnew" placeholder="Add a new player to roster" autocapitalize="words" style="flex:1"><button class="iconbtn" id="fpnewb">+</button>';
    entry.appendChild(addnew);
    addnew.querySelector("#fpnewb").onclick=function(){var v=addnew.querySelector("#fpnew").value.trim();if(!v)return;fpAddPlayer(v);};
    addnew.querySelector("#fpnew").onkeydown=function(e){if(e.key==="Enter"){var v=e.target.value.trim();if(v){fpAddPlayer(v);}}};

    var save=document.createElement("button");save.className="btn primary";save.textContent="Save game";
    save.onclick=function(){
      var n=fp.type==="doubles"?2:1;
      var t1=fp.t1.slice(0,n).filter(Boolean),t2=fp.t2.slice(0,n).filter(Boolean);
      if(t1.length<n||t2.length<n){toast("Pick all players");return;}
      var all=t1.concat(t2);if(new Set(all).size!==all.length){toast("A player is listed twice");return;}
      var v1=fp.s1===""?null:parseInt(fp.s1),v2=fp.s2===""?null:parseInt(fp.s2);
      if(isNaN(v1)||isNaN(v2)||v1==null||v2==null){toast("Enter both scores");return;}
      var g={t1:t1,t2:t2,s1:v1,s2:v2};
      freeGames(s).push(g);
      // ensure these players are in session players list (for standings seeding)
      all.forEach(function(id){if(s.players.indexOf(id)<0)s.players.push(id);});
      s._fp={type:fp.type,t1:[null,null],t2:[null,null],s1:"",s2:""};
      saveDB();render();toast("Game saved");
    };
    entry.appendChild(save);

    // list of games this session
    var games=freeGames(s).filter(function(g){return g.s1!=null&&g.s2!=null;});
    if(games.length){
      var list=document.createElement("div");list.className="card glist";
      list.innerHTML='<p class="lbl">Games this session ('+games.length+')</p>';
      freeGames(s).forEach(function(g,idx){
        if(g.s1==null||g.s2==null)return;
        var w1=g.s1>g.s2,w2=g.s2>g.s1;

        item.innerHTML='<span class="gteams"><span class="'+(w1?"gw":"")+'">'+esc(g.t1.map(nameOf).join(" & "))+'</span> vs <span class="'+(w2?"gw":"")+'">'+esc(g.t2.map(nameOf).join(" & "))+'</span></span>'+
          '<span class="gsc">'+g.s1+'–'+g.s2+'</span><button class="del" style="font-size:16px">✕</button>';
        item.querySelector(".del").onclick=function(){

        };

      });
      host.appendChild(list);
    }else{
      host.appendChild(noteEl("info","No games yet. Pick teams, enter the score, and Save."));
    }

    var endb=document.createElement("button");endb.className="btn";endb.style.marginTop="4px";endb.textContent="End session & save to History";endb.onclick=endSession;host.appendChild(endb);
    var ca=document.createElement("button");ca.className="btn ghost";ca.textContent="Clear data";ca.onclick=clearTrackData;host.appendChild(ca);
  }

  function renderConfirm(host){
    var s=S();host.innerHTML="";
    var active=(s.lockedIds&&s.lockedIds.length)?s.lockedIds.slice():s.players.slice();
    var pool=[];
    active.forEach(function(id){if(pool.indexOf(id)<0)pool.push(id);});
    s.players.forEach(function(id){if(pool.indexOf(id)<0)pool.push(id);});
    DB.roster.forEach(function(r){if(pool.indexOf(r.id)<0)pool.push(r.id);});
    if(!s._present){s._present={};active.forEach(function(id){s._present[id]=true;});}
    pool.forEach(function(id){if(s._present[id]===undefined)s._present[id]=active.indexOf(id)>=0;});

    var c=document.createElement("div");c.className="card";
    c.innerHTML='<p class="lbl">Who\u2019s playing the next round?</p>';
    var chips=document.createElement("div");chips.className="chips";
    pool.forEach(function(id){
      var on=!!s._present[id];
      var chip=document.createElement("div");chip.className="chip"+(on?" on":"");
      chip.innerHTML=esc(nameOf(id))+(on?' <span class="x">✓</span>':'');
      chip.onclick=function(){s._present[id]=!s._present[id];renderConfirm(host);};
      chips.appendChild(chip);
    });
    c.appendChild(chips);
    var addrow=document.createElement("div");addrow.className="row";addrow.style.marginTop="12px";
    addrow.innerHTML='<input type="text" id="addnew" placeholder="Add someone new" autocapitalize="words" autocomplete="off" style="flex:1"><button class="iconbtn" id="addnewb">+</button>';
    c.appendChild(addrow);host.appendChild(c);
    var inp=addrow.querySelector("#addnew");
    function addNew(){var v=inp.value.trim();if(!v){inp.focus();return;}
      var existing=DB.roster.filter(function(r){return r.name.toLowerCase()===v.toLowerCase();})[0];
      var id=existing?existing.id:addToRoster(v);
      s._present[id]=true;if(s.players.indexOf(id)<0)s.players.push(id);
      saveDB();renderConfirm(host);setTimeout(function(){var f=document.getElementById("addnew");if(f)f.focus();},30);}
    addrow.querySelector("#addnewb").onclick=addNew;
    inp.onkeydown=function(e){if(e.key==="Enter")addNew();};

    var present=pool.filter(function(id){return s._present[id];});
    if(present.length<4)host.appendChild(noteEl("warn","Need at least 4 players for doubles. "+present.length+" selected."));
    var go=document.createElement("button");go.className="btn primary";go.textContent="Start round with "+present.length+" players";
    if(present.length<4){go.disabled=true;go.style.opacity=".5";}
    go.onclick=function(){
      var pending=inp.value.trim();
      if(pending){var ex=DB.roster.filter(function(r){return r.name.toLowerCase()===pending.toLowerCase();})[0];
        var id=ex?ex.id:addToRoster(pending);s._present[id]=true;if(s.players.indexOf(id)<0)s.players.push(id);if(pool.indexOf(id)<0)pool.push(id);inp.value="";}
      var now=pool.filter(function(id){return s._present[id];});

      // archived sessions (skip excluded)

      var keys=Object.keys(data);

      keys.sort(function(a,b){

    host.appendChild(footEl("Wins–losses in doubles games. \u201C% pts\u201D = team share of total points in those games. Opponent records are influenced by who each of you was partnered with."));

  // ---------- exports ----------
  function tsv(rows){return rows.map(function(x){return x.join("\t");}).join("\n");}
  function rankExportText(s){

  function h2hMatrixToText(H,titleLines){
    var ids=Object.keys(H);

    rows.push([""]);
    if(!ids.length){rows.push(["(no completed games yet)"]);return tsv(rows);}
    rows.push(["Read each block as one player's record. \u201CRecord\u201D is that player's wins\u2013losses against or alongside the other; \u201C% pts\u201D is their team's share of points in those games."]);
    rows.push([""]);
    ids.forEach(function(id){
      rows.push(["\u25B6 "+nameOf(id)]);
      var opp=H[id].opp||{};var oppKeys=Object.keys(opp);
      oppKeys.sort(function(a,b){return nameOf(a).localeCompare(nameOf(b));});
      rows.push(["","Played AGAINST","Wins","Losses","Pts For","Pts Against","% Pts"]);
      if(oppKeys.length){oppKeys.forEach(function(o){var d=opp[o];var tot=d.pf+d.pa;var ptp=tot?Math.round(100*d.pf/tot):0;rows.push(["",nameOf(o),d.w,d.l,d.pf,d.pa,ptp+"%"]);});}
      else rows.push(["","(none)"]);
      var par=H[id].par||{};var parKeys=Object.keys(par);
      parKeys.sort(function(a,b){return nameOf(a).localeCompare(nameOf(b));});
      rows.push(["","Partnered WITH","Wins","Losses","Pts For","Pts Against","% Pts"]);
      if(parKeys.length){parKeys.forEach(function(o){var d=par[o];var tot=d.pf+d.pa;var ptp=tot?Math.round(100*d.pf/tot):0;rows.push(["",nameOf(o),d.w,d.l,d.pf,d.pa,ptp+"%"]);});}
      else rows.push(["","(none)"]);
      rows.push([""]);
    });
    return tsv(rows);
  }
  function h2hExportText(s){

  // ----- all-in-one bundle (rankings + head-to-head in one file, in sections) -----
  // scope: "session" | "track" | "all"
  function bundleRows(scope){
    var s=S(),tr=curTrack();

    }else{ // all
      rows.push(["PICKLEBALL RESULTS — ALL SESSIONS, ALL TRACKS"]);

  function bundleTSV(scope){return tsv(bundleRows(scope));}
  // Game-by-game history export. scope: "session" | "track" | "all".
  // Uses stored src.rounds where available; notes summary-only for pre-1.9 sessions.
  function gameHistoryRows(scope,archIdx){
    var rows=[];
    function emitSession(trackName,date,location,src,winBonus,scoreTo){
      rows.push([""]);
      rows.push(["SESSION",date||"",trackName||"",location||""]);
      if(!src||!src.rounds){
        rows.push(["(This session was saved by an older version — individual game scores weren\u2019t stored. Standings only.)"]);
        return;
      }
      rows.push(["Round","Court","Team 1","Score","Score","Team 2","Result"]);
      src.rounds.forEach(function(courts,ri){
        var sit=(src.sit&&src.sit[ri])?src.sit[ri]:(courts.sitouts||null);
        courts.forEach(function(g,ci){
          if(!g||!g.t1||!g.t2)return;
          var t1=g.t1.map(nameOf).filter(Boolean).join(" & ");
          var t2=g.t2.map(nameOf).filter(Boolean).join(" & ");
          var s1=(g.s1==null?"":g.s1), s2=(g.s2==null?"":g.s2);
          var res="";
          if(g.s1!=null&&g.s2!=null)res=(g.s1>g.s2?"Team 1":(g.s2>g.s1?"Team 2":"tie"))+" won";
          rows.push([ri+1,ci+1,t1,s1,s2,t2,res]);
        });
        if(sit&&sit.length)rows.push(["","Sitting out",sit.map(nameOf).join(", ")]);
      });
    }
    if(scope==="archived"){
      var trA=curTrack();var a=(trA.archive||[])[archIdx];
      rows.push(["PICKLEBALL GAME HISTORY — SAVED SESSION"]);
      rows.push(["Track",trA.name]);
      if(a)emitSession(trA.name,a.date,a.location,a.src,a.winBonus,a.src?a.src.scoreTo:null);
      return rows;
    }
    if(scope==="session"){
      var s=S(),tr=curTrack();
      rows.push(["PICKLEBALL GAME HISTORY — THIS SESSION"]);
      rows.push(["Track",tr.name]);
      emitSession(tr.name,s.date,s.location,{rounds:s.rounds,sit:s.rounds.map(function(c){return c.sitouts||null;})},s.winBonus,s.scoreTo);
    }else if(scope==="track"){
      var tr2=curTrack();
      rows.push(["PICKLEBALL GAME HISTORY — TRACK: "+tr2.name]);
      rows.push(["Generated",new Date().toISOString().slice(0,10)]);
      // current (if it has games) then archived
      if(tr2.current&&tr2.current.rounds&&tr2.current.rounds.length&&anyScores(tr2.current))
        emitSession(tr2.name,tr2.current.date+" (current, unsaved)",tr2.current.location,{rounds:tr2.current.rounds,sit:tr2.current.rounds.map(function(c){return c.sitouts||null;})},tr2.current.winBonus,tr2.current.scoreTo);
      (tr2.archive||[]).forEach(function(a){emitSession(tr2.name,a.date,a.location,a.src,a.winBonus,a.src?a.src.scoreTo:null);});
    }else{ // all
      rows.push(["PICKLEBALL GAME HISTORY — ALL TRACKS"]);
      rows.push(["Generated",new Date().toISOString().slice(0,10)]);
      DB.tracks.forEach(function(tk){
        rows.push([""]);rows.push(["TRACK",tk.name]);
        if(tk.current&&tk.current.rounds&&tk.current.rounds.length&&anyScores(tk.current))
          emitSession(tk.name,tk.current.date+" (current, unsaved)",tk.current.location,{rounds:tk.current.rounds,sit:tk.current.rounds.map(function(c){return c.sitouts||null;})},tk.current.winBonus,tk.current.scoreTo);
        (tk.archive||[]).forEach(function(a){emitSession(tk.name,a.date,a.location,a.src,a.winBonus,a.src?a.src.scoreTo:null);});
      });
    }
    return rows;
  }
  function gameHistoryFilename(scope){
    var tr=curTrack();var s=S();
    var date=(scope==="session"?(s.date||new Date().toISOString().slice(0,10)):new Date().toISOString().slice(0,10));

  // Structured game history (for on-screen boxed view + PDF). Returns [{track,date,location,older,games:[{round,court,t1,t2,s1,s2,sit}]}]
  function gameHistoryData(scope,archIdx){
    var sessions=[];
    function pull(trackName,date,location,src){
      var entry={track:trackName,date:date||"",location:location||"",older:false,games:[]};
      if(!src||!src.rounds){entry.older=true;sessions.push(entry);return;}
      src.rounds.forEach(function(courts,ri){
        var sit=(src.sit&&src.sit[ri])?src.sit[ri]:(courts.sitouts||null);
        courts.forEach(function(g,ci){
          if(!g||!g.t1||!g.t2)return;
          entry.games.push({round:ri+1,court:ci+1,
            t1:g.t1.map(nameOf).filter(Boolean),t2:g.t2.map(nameOf).filter(Boolean),
            s1:(g.s1==null?null:g.s1),s2:(g.s2==null?null:g.s2),
            sit:(sit&&sit.length)?sit.map(nameOf):null});
        });
      });
      sessions.push(entry);
    }
    if(scope==="archived"){var trA=curTrack();var a=(trA.archive||[])[archIdx];if(a)pull(trA.name,a.date,a.location,a.src);}
    else if(scope==="session"){var s=S(),tr=curTrack();pull(tr.name,s.date,s.location,{rounds:s.rounds,sit:s.rounds.map(function(c){return c.sitouts||null;})});}
    else if(scope==="track"){var tr2=curTrack();
      if(tr2.current&&tr2.current.rounds&&tr2.current.rounds.length&&anyScores(tr2.current))pull(tr2.name,tr2.current.date+" (current, unsaved)",tr2.current.location,{rounds:tr2.current.rounds,sit:tr2.current.rounds.map(function(c){return c.sitouts||null;})});
      (tr2.archive||[]).forEach(function(a){pull(tr2.name,a.date,a.location,a.src);});
    }else{DB.tracks.forEach(function(tk){
      if(tk.current&&tk.current.rounds&&tk.current.rounds.length&&anyScores(tk.current))pull(tk.name,tk.current.date+" (current, unsaved)",tk.current.location,{rounds:tk.current.rounds,sit:tk.current.rounds.map(function(c){return c.sitouts||null;})});
      (tk.archive||[]).forEach(function(a){pull(tk.name,a.date,a.location,a.src);});
    });}
    return sessions;
  }

  // ---- positive-vibe summary -------------------------------------------------
  // Generates upbeat, honest text from real stats. Everyone who played gets a line.
  function rowsToCSV(rows){
    return rows.map(function(r){return r.map(function(cell){
      var v=(cell==null?"":String(cell));
      if(/[",\n]/.test(v))v='"'+v.replace(/"/g,'""')+'"';
      return v;
    }).join(",");}).join("\r\n");
  }
  function safeName(str){return String(str||"").replace(/[^a-z0-9]+/gi,"-").replace(/^-+|-+$/g,"").toLowerCase()||"pickleball";}
  function bundleFilename(scope){
    var tr=curTrack();var s=S();

  // shared sort comparators (used by rankings view AND reports so they match)
  function rankComparator(key,combined){
    var nm=function(p){return (combined?combinedName(p):nameOf(p.id))||"";};
    var map={
      score:function(a,b){return b.rankPct-a.rankPct||b.pct-a.pct||b.gp-a.gp;},
      wins:function(a,b){return b.w-a.w||(a.l-b.l)||b.gp-a.gp;},
      pts:function(a,b){return b.pts-a.pts||b.w-a.w||b.gp-a.gp;},
      scored:function(a,b){return (b.scored||0)-(a.scored||0)||b.gp-a.gp;},
      ppg:function(a,b){return b.ppg-a.ppg||b.gp-a.gp;},
      diff:function(a,b){return ((b.scored||0)-(b.against||0))-((a.scored||0)-(a.against||0))||b.gp-a.gp;},
      diffpg:function(a,b){var da=a.gp>0?((a.scored||0)-(a.against||0))/a.gp:0,db=b.gp>0?((b.scored||0)-(b.against||0))/b.gp:0;return db-da||b.gp-a.gp;},
      bonus:function(a,b){return (b.bonus||0)-(a.bonus||0)||b.w-a.w||b.gp-a.gp;},
      pctpts:function(a,b){return b.pct-a.pct||b.gp-a.gp;},
      games:function(a,b){return b.gp-a.gp||b.rankPct-a.rankPct;},
      az:function(a,b){return nm(a).toLowerCase().localeCompare(nm(b).toLowerCase());}
    };
    return map[key]||map.score;
  }
  var SORT_LABELS={score:"Score %",wins:"W–L",pts:"Total pts",scored:"Tot pts scored",ppg:"Pts/game",diff:"Differential",diffpg:"Diff/game",bonus:"Win bonus",pctpts:"% of pts",games:"Games",az:"A–Z (name)"};

  // ---- Combined report (Games played · Head-to-head) ----------------
  // scope: "session" | "track" | "all" | "archived"(+archIdx). Returns {title,sub,standings,h2h,nm,filterNote,sortLabel}.
  function reportData(scope,archIdx){
    var tr=curTrack(),title,sub,standArr,H,nm,combined=false,mirror=false;
    if(scope==="archived"){
      var a=(tr.archive||[])[archIdx];
      title="Session report — "+tr.name; sub=(a&&a.date||"")+(a&&a.location?" · "+a.location:"");
      standArr=(a&&a.results||[]).slice(); H=(a&&a.h2h)||{}; nm=function(p){return p.name||nameOf(p.id);};
    }else if(scope==="all"){
      title="All-tracks report"; sub="Every session, all tracks";
      standArr=combinedStandings(); H=cumulativeH2HAllTracks(); combined=true; mirror=true; nm=function(p){return combinedName(p);};
    }else if(scope==="track"){
      title="Track report — "+tr.name; sub="All sessions in this track";
      standArr=trackCumulativeStandings(tr); H=cumulativeH2HForTrack(tr); mirror=true; nm=function(p){return combinedName(p);};
    }else{
      var s=S(); title="Session report — "+tr.name; sub=(s.date||"")+(s.location?" · "+s.location:"");
      standArr=standings(s); H=headToHead(s); mirror=true; nm=function(p){return nameOf(p.id);};
    }
    var sortLabel=null,filterNote=null;
    if(mirror){
      // mirror the on-screen view: same sort + same games filter
      var key=window._rankSort||"score";
      standArr=standArr.slice().sort(rankComparator(key,combined));
      sortLabel=SORT_LABELS[key]||"Score %";
      var minG=window._minGames||0;
      if(minG>0){
        standArr=standArr.filter(function(p){return (p.gp||0)>=minG;});
        filterNote="Showing only players with "+minG+"+ games (filter active on screen).";
      }
    }
    // alphabetical order of players for the HEAD-TO-HEAD section (blocks A–Z), independent of standings sort
    var h2hOrder=standArr.slice().sort(function(a,b){return (nm(a)||"").toLowerCase().localeCompare((nm(b)||"").toLowerCase());});
    return {title:title,sub:sub,standings:standArr,h2hOrder:h2hOrder,h2h:H,nm:nm,filterNote:filterNote,sortLabel:sortLabel};
  }

  // CSV rows for the combined 3-section report
  function reportRows(scope,archIdx){

    });
    rows.push([""]);
    // Section 2: head-to-head — player blocks A–Z; opponents/partners by record
    rows.push(["HEAD-TO-HEAD (players A–Z)"]);
    d.h2hOrder.forEach(function(p){

        rows.push(["","vs (opponent)","W","L","Pts for","Pts against"]);
        opp.sort(function(a,b){var ra=rec.opp[a],rb=rec.opp[b];var pa=(ra.w+ra.l)?ra.w/(ra.w+ra.l):0,pb=(rb.w+rb.l)?rb.w/(rb.w+rb.l):0;return (rb.w-ra.w)||(pb-pa)||((rb.pf-rb.pa)-(ra.pf-ra.pa));});
        opp.forEach(function(k){var v=rec.opp[k];rows.push(["",nameOf(k),v.w,v.l,v.pf,v.pa]);});
      }
      var par=Object.keys(rec.par||{});
      if(par.length){
        rows.push(["","with (partner)","W","L","Pts for","Pts against"]);
        par.sort(function(a,b){var ra=rec.par[a],rb=rec.par[b];var pa=(ra.w+ra.l)?ra.w/(ra.w+ra.l):0,pb=(rb.w+rb.l)?rb.w/(rb.w+rb.l):0;return (rb.w-ra.w)||(pb-pa)||((rb.pf-rb.pa)-(ra.pf-ra.pa));});
        par.forEach(function(k){var v=rec.par[k];rows.push(["",nameOf(k),v.w,v.l,v.pf,v.pa]);});
      }
    });
    // Section 3: game-by-game history
    rows.push([""]);rows.push(["GAME HISTORY"]);
    var gh=gameHistoryData(scope,archIdx);
    gh.forEach(function(sess){
      rows.push([""]);rows.push(["Session",sess.date,sess.track,sess.location||""]);
      if(sess.older){rows.push(["(Saved by an older version — individual game scores weren\u2019t stored.)"]);return;}
      rows.push(["Round","Court","Team 1","Score","Score","Team 2","Result"]);
      sess.games.forEach(function(g){
        var res="";if(g.s1!=null&&g.s2!=null)res=(g.s1>g.s2?"Team 1":(g.s2>g.s1?"Team 2":"tie"))+(g.s1===g.s2?"":" won");
        rows.push([g.round,g.court,g.t1.join(" & "),(g.s1==null?"":g.s1),(g.s2==null?"":g.s2),g.t2.join(" & "),res]);
      });
    });
    return rows;
  }
  function reportFilename(scope,ext){
    var tr=curTrack(),s=S();

  // Build a clean printable HTML page and open the device print dialog (Save as PDF / Save to Files)
  function openReportPDF(scope,archIdx){

    }
    // games played + standings

  // share results. iOS Safari is unreliable at sharing Blob FILES (often empty),
  // but reliable at sharing TEXT. So: try file share; if unavailable, share text; then download; then clipboard.
  function shareOrDownload(rows,filename,host){
    var csv=rowsToCSV(rows);
    if(!csv||!csv.trim()){toast("Nothing to share yet — no results on this track.");return;}
    var blob=new Blob([csv],{type:"text/csv"});
    // 1) try native FILE share (best on Mac/desktop & Android)
    try{
      if(navigator.canShare){
        var file=new File([blob],filename,{type:"text/csv"});
        if(navigator.canShare({files:[file]})){
          navigator.share({files:[file],title:"Pickleball results"})
            .then(function(){toast("Shared");})
            .catch(function(){shareText(csv,host,blob,filename);});
          return;
        }
      }
    }catch(e){}
    shareText(csv,host,blob,filename);
  }
  // share the CSV as plain text (reliable on iOS), fallbacks: download, then clipboard
  function shareText(csv,host,blob,filename){
    try{
      if(navigator.share){
        navigator.share({title:"Pickleball results",text:csv})
          .then(function(){toast("Shared");})
          .catch(function(){downloadBlob(blob,filename,host);});
        return;
      }
    }catch(e){}
    downloadBlob(blob,filename,host);
  }
  function downloadBlob(blob,filename,host){
    try{
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");a.href=url;a.download=filename;
      document.body.appendChild(a);a.click();
      setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
      toast("Saved "+filename);
    }catch(e){
      // last resort: copy to clipboard so the data is never lost
      try{
        if(navigator.clipboard&&navigator.clipboard.writeText){
          var txt=blob._csv||"";
          navigator.clipboard.writeText(txt);
        }
      }catch(e2){}
      toast("Couldn't save a file here — try the Copy buttons below instead");
    }
  }

    var loadCodeBtn=document.createElement("button");loadCodeBtn.className="btn";loadCodeBtn.textContent="Load from code";
    loadCodeBtn.onclick=function(){doImport(document.getElementById("xfer_inbox").value);};
    det.appendChild(loadCodeBtn);
    host.appendChild(det);

    function doImport(text){
      var res=parseImport(text);
      if(!res.ok){alert(res.error);return;}
      var p=res.payload;
      var incoming=p.summary||countStats(p.data);
      var incomingTime=p.exportedAt||0;
      var curTime=currentDataTimestamp();
      var msg="Load this onto "+deviceLabel()+"?\n\n";
      msg+="• "+incoming.tracks+" track(s), "+incoming.players+" players, "+incoming.sessions+" session(s)\n";
      msg+="• From: "+(p.device||"unknown device")+"\n";
      msg+="• Made: "+(p.exportedAtText||(incomingTime?new Date(incomingTime).toLocaleString():"unknown"))+"\n\n";
      msg+="This REPLACES what's on this device now ("+sum.tracks+" tracks, "+sum.players+" players, "+sum.sessions+" sessions). A safety backup is saved so you can undo.\n";
      if(incomingTime&&curTime&&incomingTime<curTime){
        msg+="\n⚠️ WARNING: this backup is OLDER than what's on this device.\nBackup: "+new Date(incomingTime).toLocaleString()+"\nThis device: "+new Date(curTime).toLocaleString()+"\nIf someone has entered scores here, loading older data will overwrite their work.\n";
      }
      msg+="\nContinue?";
      if(!confirm(msg))return;
      applyImport(p);
      view="setup";render();
      alert("Loaded! Everything from the backup is now on this device.");
    }
  }

  function doCopy(text,host){
    function fallback(){var ex=host.querySelector(".exp");if(ex)ex.remove();
      var ta=document.createElement("textarea");ta.className="exp";ta.readOnly=true;ta.value=text;host.appendChild(ta);ta.focus();ta.select();toast("Tap & hold the box to copy");}
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){toast("Copied — paste into Sheets");}).catch(fallback);}
    else fallback();
  }

  loadDB();
  document.querySelectorAll(".tab").forEach(function(t){t.addEventListener("click",function(){if(window._rankMode==="archived")window._rankMode="session";window._minGames=0;window._customGames=false;view=t.dataset.v;render();});});
  (function(){var tl=document.querySelector(".trackslabel");if(tl)tl.appendChild(helpBtn("A track is one ongoing competition \u2014 a ladder, league, or rec group \u2014 with its own players and history. Tap a track to switch to it; tap the active one for rename/delete options; tap \u201C+\u201D to start a new one. See the Help tab for more."));})();
  render();
})();
</script>
</body>
</html>
